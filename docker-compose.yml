version: '3.8'

services:
  # Redis for caching and background tasks
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # PostgreSQL database (optional - SQLite is default)
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: network_scanner
      POSTGRES_USER: network_scanner
      POSTGRES_PASSWORD: network_scanner_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Network Scanner Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///network_scanner.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-this
      # Bind Flask to all interfaces inside the container so Docker port-forwarding
      # and the frontend container can reach it. The default 127.0.0.1 would break
      # Docker networking. Operators running bare-metal should leave HOST unset.
      - HOST=0.0.0.0
      # Reports directory — bind-mounted below as ./reports:/app/reports
      - REPORTS_DIR=/app/reports
      # Allow the React frontend container (and localhost dev) to call the API.
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://frontend
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - backend_data:/app/data
    depends_on:
      - redis
    networks:
      - network-scanner

  # Network Scanner Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - network-scanner

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - network-scanner

volumes:
  redis_data:
  postgres_data:
  backend_data:

networks:
  network-scanner:
    driver: bridge
